services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: http://192.168.1.10:8888/api
    container_name: idea-generator-ui
    ports:
      - "3001:3000"
    environment:
      - API_BASE_URL=http://nano-banana-api:8000/api
    restart: unless-stopped
    networks:
      - nano-banana-network

networks:
  nano-banana-network:
    external: true
